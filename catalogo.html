<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marin Metal PDL — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --steel: #1a1f2e;
    --steel-mid: #242938;
    --steel-light: #2e3548;
    --accent: #e8b84b;
    --accent2: #4b8fe8;
    --text: #f0f2f8;
    --text-dim: #8892a4;
    --border: rgba(255,255,255,0.07);
    --radius: 12px;
    --wa-green: #25D366;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--steel);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
  }

  /* ── HEADER ── */
  header{
    background:var(--steel-mid);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(12px);
  }
  .header-inner{
    max-width:1200px;margin:0 auto;
    padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    flex-wrap:wrap;
  }
  .logo{
    display:flex;align-items:center;gap:12px;
  }
  .logo-icon{
    width:52px;height:52px;
    background:#000;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    overflow:hidden;
    padding:2px;
  }
  .logo-text{
    font-family:'Bebas Neue',sans-serif;
    font-size:22px;letter-spacing:1px;
    line-height:1;
  }
  .logo-sub{font-size:11px;color:var(--text-dim);margin-top:2px;letter-spacing:.5px}

  /* ── CONTROLS ── */
  .controls{
    max-width:1200px;margin:0 auto;
    padding:20px 20px 0;
    display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;
  }
  .ctrl-group{display:flex;flex-direction:column;gap:5px}
  .ctrl-label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px}
  select, .search-inp{
    background:var(--steel-mid);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:9px 14px;
    font-size:13px;
    font-family:'DM Sans',sans-serif;
    outline:none;
    cursor:pointer;
    transition:border-color .2s;
    min-width:140px;
  }
  select:focus, .search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,184,75,.12)}
  .search-inp{min-width:200px}
  .search-inp::placeholder{color:var(--text-dim)}

  /* ── ALMACEN SELECTOR ── */
  .alm-btns{display:flex;gap:8px}
  .alm-btn{
    padding:9px 18px;border-radius:8px;
    border:1px solid var(--border);
    background:transparent;color:var(--text-dim);
    font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;
    cursor:pointer;transition:all .2s;
  }
  .alm-btn.active{
    background:var(--accent);color:#1a1f2e;
    border-color:var(--accent);font-weight:600;
  }
  .alm-btn:not(.active):hover{border-color:var(--accent);color:var(--accent)}

  /* ── MON PILLS ── */
  .mon-pills{display:flex;gap:6px;flex-wrap:wrap}
  .mon-pill{
    padding:6px 14px;border-radius:20px;
    border:1px solid var(--border);
    background:transparent;color:var(--text-dim);
    font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;
    cursor:pointer;transition:all .18s;
  }
  .mon-pill.active{
    background:var(--accent2);color:#fff;
    border-color:var(--accent2);
  }
  .mon-pill:not(.active):hover{border-color:var(--accent2);color:var(--accent2)}

  /* ── GRID ── */
  .grid-wrap{max-width:1200px;margin:0 auto;padding:24px 20px 40px}
  .prod-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:16px;
  }

  /* ── CARD ── */
  .card{
    background:var(--steel-mid);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;flex-direction:column;
    transition:transform .2s, box-shadow .2s;
    position:relative;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.35)}

  .card-img{
    width:100%;aspect-ratio:4/3;
    object-fit:cover;
    background:var(--steel-light);
    display:flex;align-items:center;justify-content:center;
    font-size:40px;color:var(--text-dim);
    position:relative;overflow:hidden;
  }
  .card-img img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;z-index:1;background:var(--steel-light)}
  .card-img .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;z-index:0}
  .card-img .placeholder span{font-size:11px;color:var(--text-dim);font-weight:500}

  .card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:8px}
  .card-name{font-size:14px;font-weight:600;line-height:1.3}
  .card-cat{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .card-stock{font-size:11px;color:var(--text-dim)}
  .stock-ok{color:#4be8a0}
  .stock-low{color:var(--accent)}

  .prices{
    background:var(--steel-light);
    border-radius:8px;padding:10px 12px;
    display:flex;flex-direction:column;gap:4px;
    margin-top:4px;
  }
  .price-row{
    display:flex;justify-content:space-between;align-items:center;
    font-size:12px;
  }
  .price-row .lbl{color:var(--text-dim)}
  .price-row .val{font-weight:600;font-size:13px}
  .price-row.main .val{font-size:16px;color:var(--accent)}

  /* qty control */
  .qty-row{
    display:flex;align-items:center;justify-content:space-between;
    gap:8px;margin-top:6px;
  }
  .qty-ctrl{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .qty-btn{
    width:42px;height:42px;background:transparent;
    border:none;color:var(--text);font-size:20px;
    cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .qty-btn:hover,.qty-btn:active{background:var(--steel-light)}
  .qty-inp{
    width:44px;text-align:center;background:transparent;
    border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);
    color:var(--text);font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;
    padding:0 4px;height:42px;
    -webkit-appearance:none;-moz-appearance:textfield;appearance:textfield;
  }
  .qty-inp::-webkit-inner-spin-button,.qty-inp::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .qty-inp:focus{outline:none}
  .qty-disp{
    width:44px;text-align:center;
    border-left:1px solid var(--border);border-right:1px solid var(--border);
    color:var(--text);font-size:16px;font-weight:700;
    display:flex;align-items:center;justify-content:center;height:42px;
    min-width:44px;
  }
  .add-btn{
    flex:1;padding:0 12px;height:42px;
    background:var(--accent);color:#1a1f2e;
    border:none;border-radius:8px;
    font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;
    cursor:pointer;transition:all .15s;
    white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .add-btn:hover{background:#f5cc6a}
  .add-btn:active{transform:scale(0.97)}
  .add-btn.added{background:#4be8a0;color:#1a1f2e}

  /* ── CART FLOAT ── */
  #cart-float{
    position:fixed;bottom:24px;right:24px;z-index:200;
    display:none;
  }
  .cart-btn{
    background:var(--wa-green);
    color:#fff;border:none;
    padding:14px 22px;border-radius:50px;
    font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;
    cursor:pointer;box-shadow:0 8px 24px rgba(37,211,102,.4);
    display:flex;align-items:center;gap:10px;
    transition:all .2s;
  }
  .cart-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(37,211,102,.5)}
  .cart-count{
    background:rgba(0,0,0,.25);
    border-radius:50%;width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;
  }

  /* ── MODAL CART ── */
  #cart-modal{
    display:none;position:fixed;inset:0;z-index:300;
    background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
    align-items:flex-end;justify-content:center;
  }
  #cart-modal.open{display:flex}
  .modal-box{
    background:var(--steel-mid);
    border-radius:20px 20px 0 0;
    width:100%;max-width:540px;
    max-height:85vh;overflow-y:auto;
    padding:24px 20px 32px;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:26px;letter-spacing:1px;
    margin-bottom:16px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .modal-close{
    background:var(--steel-light);border:none;color:var(--text);
    width:32px;height:32px;border-radius:50%;cursor:pointer;
    font-size:16px;display:flex;align-items:center;justify-content:center;
  }
  .cart-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--border);
    gap:12px;
  }
  .cart-item-name{font-size:13px;font-weight:500;flex:1}
  .cart-item-qty{font-size:12px;color:var(--text-dim)}
  .cart-item-price{font-size:13px;font-weight:700;color:var(--accent)}
  .cart-item-rm{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:0 4px}
  .cart-item-rm:hover{color:#e84b4b}
  .cart-total{
    display:flex;justify-content:space-between;
    padding:14px 0 4px;font-weight:700;font-size:16px;
  }
  .cart-total span:last-child{color:var(--accent)}
  .cart-note{
    width:100%;background:var(--steel-light);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px 12px;
    font-size:13px;font-family:'DM Sans',sans-serif;
    resize:vertical;min-height:60px;margin:12px 0;outline:none;
  }
  .cart-note:focus{border-color:var(--accent)}
  .wa-send-btn{
    width:100%;padding:14px;
    background:var(--wa-green);color:#fff;
    border:none;border-radius:10px;
    font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:all .15s;margin-top:4px;
  }
  .wa-send-btn:hover{background:#1fb855;transform:scale(1.01)}
  .wa-icon{font-size:20px}

  /* ── EMPTY ── */
  .empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty p{font-size:14px}

  /* ── LOADING ── */
  .loading{text-align:center;padding:60px 20px;color:var(--text-dim)}
  .spinner{
    width:36px;height:36px;border:3px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── FOOTER ── */
  footer{
    border-top:1px solid var(--border);
    text-align:center;padding:20px;
    font-size:12px;color:var(--text-dim);
  }

  @media(max-width:768px){
    .prod-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  }
  @media(max-width:600px){
    .header-inner{padding:12px 16px}
    .controls{padding:16px 16px 0;gap:10px}
    .grid-wrap{padding:16px 16px 100px}
    .prod-grid{grid-template-columns:1fr 1fr;gap:10px}
    .card-body{padding:10px 12px;gap:6px}
    .card-name{font-size:13px}
    .prices{padding:8px 10px}
    .price-row .val{font-size:12px}
    #cart-float{bottom:16px;right:16px}
    .modal-box{padding:20px 16px 28px}
    .alm-btn{padding:8px 14px;font-size:12px}
    .mon-pill{padding:5px 10px;font-size:11px}
    select,.search-inp{min-width:unset;width:100%}
    .ctrl-group{width:100%}
  }
  @media(max-width:380px){
    .prod-grid{grid-template-columns:1fr}
  }
</style>
</head>

<script>
// ── CONFIG ───────────────────────────────────────────────
const SUPA_URL = 'https://gpkslaqfqfdeoleiayng.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdwa3NsYXFmcWZkZW9sZWlheW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Nzk0MzQsImV4cCI6MjA4OTI1NTQzNH0.iTMO4obXaYC2O1QkAgkaRjygMvjkFnCFuVBVO35DmRk';

const WA = {
  Habana:   '5358721200',
  Placetas: '5353425247'
};

// Exchange rates (loaded from Supabase tasas table)
let RATES = { USD:1, EUR:1.12, CUP:370, CUPT:270 };
let PRODS = [];
let ALM = 'Habana';
let MON = 'USD';
let CART = {}; // {prodName: {prod, qty}}

const MON_SYM = { USD:'$', EUR:'€', CUP:'₱', CUPT:'₱' };
const MON_DEC = { USD:2, EUR:2, CUP:0, CUPT:0 };

// ── UTILS ─────────────────────────────────────────────────
function fN(n, dec){ 
  if(isNaN(n)||n==null) return '—';
  return parseFloat(n).toLocaleString('es-ES',{minimumFractionDigits:dec??2,maximumFractionDigits:dec??2});
}
function fromUSD(usd, mon){
  if(mon==='USD') return usd;
  if(mon==='EUR') return usd / RATES.EUR;
  if(mon==='CUP') return usd * RATES.CUP;
  if(mon==='CUPT') return usd * RATES.CUPT;
  return usd;
}
function fPrice(usd, mon){
  var v = fromUSD(usd, mon);
  return MON_SYM[mon] + ' ' + fN(v, MON_DEC[mon]);
}

// ── SUPABASE ──────────────────────────────────────────────
async function supa(path){
  var r = await fetch(SUPA_URL+'/rest/v1/'+path, {
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
  });
  if(!r.ok) throw new Error('Supabase '+r.status);
  return r.json();
}

// ── INIT ──────────────────────────────────────────────────
async function init(){
  try{
    // Load rates — fallback to hardcoded if RLS blocks anon
    try{
      var tasas = await supa('tasas?select=moneda,valor');
      if(tasas&&tasas.length){
        tasas.forEach(function(t){
          if(t.moneda==='USD')  RATES.CUP  = parseFloat(t.valor)||370;
          if(t.moneda==='EUR')  RATES.EUR  = parseFloat(t.valor)||1.12;
          if(t.moneda==='CUPT') RATES.CUPT = parseFloat(t.valor)||270;
        });
      }
    }catch(e){ console.warn('Tasas: usando valores por defecto'); }
    // Load products
    var rows;
    try{
      rows = await supa('productos?select=*,stock_almacen(*)&activo=eq.true&order=nombre.asc');
    }catch(e){
      // Show specific error
      var msg = e.message||'Error desconocido';
      document.getElementById('prod-grid').innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><p>Error cargando productos:<br><code style="font-size:11px;color:var(--accent)">'+msg+'</code><br><br>Verifica que RLS está desactivado en Supabase:<br><code style="font-size:10px;color:var(--text-dim)">ALTER TABLE productos DISABLE ROW LEVEL SECURITY;</code></p></div>';
      document.getElementById('last-update').textContent = '● Error 401';
      return;
    }
    PRODS = (rows||[]).map(function(r){
      var stk_alm = {};
      (r.stock_almacen||[]).forEach(function(s){ stk_alm[s.almacen]=s.cantidad||0; });
      return {
        id: r.id,
        n: r.nombre,
        cat: r.categoria||'',
        min: parseFloat(r.precio_min)||0,
        maj: parseFloat(r.precio_maj)||0,
        stk: Object.values(stk_alm).reduce(function(a,b){return a+b;},0),
        stk_alm: stk_alm,
        img: r.imagen_url||'',
        enStock: r.en_stock!==false,
        activo: r.activo!==false
      };
    }).filter(function(p){ return p.enStock && p.activo; });

    // Build categories
    var cats = [...new Set(PRODS.map(function(p){return p.cat;}).filter(Boolean))].sort();
    var sel = document.getElementById('cat-sel');
    cats.forEach(function(c){
      var o = document.createElement('option');
      o.value=c; o.textContent=c; sel.appendChild(o);
    });

    document.getElementById('last-update').textContent = '● En línea';
    render();
  }catch(e){
    document.getElementById('last-update').textContent = '● Error: '+e.message;
    document.getElementById('prod-grid').innerHTML = '<div class="empty"><div class="empty-icon">📡</div><p>'+e.message+'</p></div>';
  }
}

// ── FILTERS ───────────────────────────────────────────────
function setAlm(alm, btn){
  ALM = alm;
  document.querySelectorAll('.alm-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  CART = {}; updCart();
  render();
}
function setMon(mon, btn){
  MON = mon;
  document.querySelectorAll('.mon-pill').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function filteredProds(){
  var q = (document.getElementById('search').value||'').toLowerCase();
  var cat = document.getElementById('cat-sel').value;
  return PRODS.filter(function(p){
    if(cat && p.cat !== cat) return false;
    if(q && p.n.toLowerCase().indexOf(q)<0) return false;
    var stk = (p.stk_alm&&p.stk_alm[ALM])||0;
    return stk > 0;
  });
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  var prods = filteredProds();
  var grid = document.getElementById('prod-grid');
  if(!prods.length){
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📦</div><p>Sin productos disponibles para <strong>'+ALM+'</strong>.<br>Prueba con otro almacén o categoría.</p></div>';
    return;
  }
  grid.innerHTML = prods.map(function(p){ return cardHTML(p); }).join('');
}

function cardHTML(p){
  var stk = (p.stk_alm&&p.stk_alm[ALM])||0;
  var stkLabel = stk > 10 ? '<span class="stock-ok">✓ Disponible ('+stk+' uds)</span>' 
               : stk > 0  ? '<span class="stock-low">⚠ Pocas unidades ('+stk+')</span>'
               : '<span style="color:#e84b4b">✗ Sin stock en '+ALM+'</span>';
  var cartItem = CART[p.n];
  var qty = cartItem ? cartItem.qty : 1;
  // Mayorista si qty >= MIN_MAY (10 uds por defecto)
  var MIN_MAY = p.min_may || 10;
  var isMay = qty >= MIN_MAY && p.maj > 0;
  var priceMin = p.min || 0;
  var priceMaj = p.maj || p.min || 0;
  var price = isMay ? priceMaj : priceMin;

  var cardId = p.id||p.n.replace(/[^a-zA-Z0-9]/g,'_');
  var pidx = PRODS.indexOf(p);
  return '<div class="card" id="card-'+cardId+'" data-pidx="'+pidx+'">'
    +'<div class="card-img">'
    +(p.img ? '<img src="'+p.img+'" alt="'+esc(p.n)+'" onerror="this.style.display=\'none\'">' : '<div class="placeholder"><span>🏗️</span><span>'+esc(p.n.split(' ').slice(0,2).join(' '))+'</span></div>')
    +'</div>'
    +'<div class="card-body">'
    +(p.cat?'<div class="card-cat">'+esc(p.cat)+'</div>':'')
    +'<div class="card-name">'+esc(p.n)+'</div>'
    +'<div class="card-stock">'+stkLabel+'</div>'
    +'<div class="prices">'
    +(p.maj>0&&p.min>0&&p.maj!==p.min?
      '<div class="price-row" style="margin-bottom:2px">'
      +'<span class="lbl" style="font-size:10px">Minorista (1-'+(MIN_MAY-1)+' uds)</span>'
      +'<span class="val" style="font-size:12px'+(isMay?';color:var(--text-dim)':';color:var(--accent)')+'">'+fPrice(priceMin,MON)+'</span></div>'
      +'<div class="price-row" style="margin-bottom:4px">'
      +'<span class="lbl" style="font-size:10px">Mayorista (+'+MIN_MAY+' uds)</span>'
      +'<span class="val" style="font-size:12px'+(isMay?';color:var(--accent)':';color:var(--text-dim)')+'">'+fPrice(priceMaj,MON)+'</span></div>'
      :'<div class="price-row main"><span class="lbl">Precio</span><span class="val">'+fPrice(price||priceMaj||priceMin,MON)+'</span></div>')
    +'<div style="border-top:1px solid rgba(255,255,255,.06);margin:4px 0"></div>'
    + ['USD','EUR','CUP','CUPT'].filter(function(m){return m!==MON;}).map(function(m){
        return '<div class="price-row"><span class="lbl" style="font-size:10px">'+m+'</span><span class="val" style="font-size:11px">'+fPrice(price,m)+'</span></div>';
      }).join('')
    +'</div>'
    +(stk>0?
      '<div class="qty-row">'
      +'<div class="qty-ctrl">'
      +'<button class="qty-btn" onclick="chgQtyIdx('+pidx+',-1)" type="button">−</button>'
      +'<span class="qty-disp" id="qd-'+cardId+'">'+qty+'</span>'
      +'<button class="qty-btn" onclick="chgQtyIdx('+pidx+',1)" type="button">+</button>'
      +'</div>'
      +'<button class="add-btn'+(cartItem?' added':'')+'" id="addbtn-'+cardId+'" onclick="addToCartIdx('+pidx+')" type="button">'
      +(cartItem?'✓ Agregado':'+ Agregar')
      +'</button>'
      +'</div>':'')
    +'</div>'
    +'</div>';
}

function esc(s){ return (s||'').replace(/['"<>&]/g,function(c){return {'\'':'&#39;','"':'&quot;','<':'&lt;','>':'&gt;','&':'&amp;'}[c];}); }

// ── CART ──────────────────────────────────────────────────
function getQtyInpIdx(idx){ return document.querySelector('.qty-inp[data-idx="'+idx+'"]'); }
function _getCardId(p){ return p.id ? String(p.id) : p.n.replace(/[^a-zA-Z0-9]/g,'_'); }
function _getQtyDisp(idx){
  var p=PRODS[idx]; if(!p) return null;
  return document.getElementById('qd-'+_getCardId(p));
}
function _getQtyVal(idx){
  var sp=_getQtyDisp(idx); return sp ? parseInt(sp.textContent)||1 : 1;
}
function chgQtyIdx(idx, d){
  var p = PRODS[idx]; if(!p) return;
  var sp = _getQtyDisp(idx); if(!sp) return;
  var v = Math.max(1, _getQtyVal(idx) + d);
  sp.textContent = v;
  // Update price highlight if mayorista threshold
  if(p.maj>0){
    var MIN_MAY = p.min_may||10;
    var isMay = v >= MIN_MAY;
    // Update price display
    var card = document.getElementById('card-'+_getCardId(p));
    if(card){
      var minEl = card.querySelector('.price-min');
      var majEl = card.querySelector('.price-maj');
      if(minEl) minEl.style.color = isMay ? 'var(--text-dim)' : 'var(--accent)';
      if(majEl) majEl.style.color = isMay ? 'var(--accent)' : 'var(--text-dim)';
    }
  }
}
function addToCartIdx(idx){
  var p = PRODS[idx]; if(!p) return;
  var qty = _getQtyVal(idx);
  CART[p.n] = {prod:p, qty:qty};
  var btn = document.getElementById('addbtn-'+_getCardId(p));
  if(btn){ btn.textContent='✓ Agregado'; btn.classList.add('added'); }
  updCart();
}
function getQtyInp(name){ return document.querySelector('.qty-inp[data-name="'+name+'"]'); }
function getQty(name){
  var p = PRODS.find(function(x){return x.n===name;});
  var idx = p ? PRODS.indexOf(p) : -1;
  var inp = idx>=0 ? getQtyInpIdx(idx) : null;
  return inp ? parseInt(inp.value)||1 : 1;
}
function chgQty(name, d){
  var p = PRODS.find(function(x){return x.n===name;});
  if(p) chgQtyIdx(PRODS.indexOf(p), d);
}
function reRenderCard(name){
  var p = PRODS.find(function(x){return x.n===name;});
  if(!p) return;
  var cardId = p.id ? String(p.id) : p.n.replace(/[^a-zA-Z0-9]/g,'_');
  var card = document.getElementById('card-'+cardId);
  if(!card) return;
  if(CART[name]){
    var inp = getQtyInp(name);
    if(inp) CART[name].qty = parseInt(inp.value)||1;
  }
  card.outerHTML = cardHTML(p);
}
function setQty(name, v){
  var inp = getQtyInp(name);
  if(inp) inp.value = Math.max(1, parseInt(v)||1);
}
function addToCart(name){
  var p = PRODS.find(function(x){return x.n===name;});
  if(!p) return;
  var qty = getQty(name);
  CART[name] = {prod:p, qty:qty};
  var cardId = p.id ? String(p.id) : p.n.replace(/[^a-zA-Z0-9]/g,'_');
  var btn = document.getElementById('addbtn-'+cardId);
  if(btn){ btn.textContent='✓ Agregado'; btn.classList.add('added'); }
  updCart();
}
function removeFromCart(name){
  delete CART[name];
  updCart();
  renderCart();
  render();
}
function updCart(){
  var items = Object.values(CART);
  var count = items.reduce(function(a,i){return a+i.qty;},0);
  var float = document.getElementById('cart-float');
  var cnt = document.getElementById('cart-count');
  float.style.display = items.length ? 'block' : 'none';
  if(cnt) cnt.textContent = count;
}
function openCart(){
  var modal = document.getElementById('cart-modal');
  modal.classList.add('open');
  renderCart();
}
function closeCart(){ document.getElementById('cart-modal').classList.remove('open'); }
function closeCartOutside(e){ if(e.target===document.getElementById('cart-modal')) closeCart(); }

function getCartPrice(i){
  var MIN_MAY = i.prod.min_may || 10;
  var isMay = i.qty >= MIN_MAY && i.prod.maj > 0;
  return {price: isMay ? (i.prod.maj||i.prod.min) : (i.prod.min||0), isMay:isMay, MIN_MAY:MIN_MAY};
}
function updCartQty(name, val){
  if(!CART[name]) return;
  CART[name].qty = Math.max(1, parseInt(val)||1);
  renderCart(); updCart();
}
function renderCart(){
  var items = Object.values(CART);
  var el = document.getElementById('cart-items');
  var totEl = document.getElementById('cart-total-val');
  if(!items.length){ el.innerHTML='<div style="color:var(--text-dim);font-size:13px;padding:16px 0">Sin productos agregados</div>'; totEl.textContent='0,00'; return; }
  var total = 0;
  el.innerHTML = items.map(function(i){
    var r = getCartPrice(i);
    var lineTotal = r.price * i.qty;
    total += lineTotal;
    var tag = i.prod.maj>0 ? (r.isMay
      ? '<span style="font-size:9px;background:var(--accent2);color:#fff;padding:1px 6px;border-radius:4px;margin-left:6px">Mayorista</span>'
      : '<span style="font-size:9px;color:var(--text-dim);padding:1px 4px;border-radius:4px;margin-left:6px">Min·'+r.MIN_MAY+'+→May</span>') : '';
    return '<div class="cart-item">'
      +'<div style="flex:1;min-width:0">'
      +'<div class="cart-item-name">'+esc(i.prod.n)+tag+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-top:6px">'
      +'<div class="qty-ctrl">'
      +'<button class="qty-btn" onclick="updCartQty(\''+esc(i.prod.n)+'\',' +(i.qty-1)+ ')">−</button>'
      +'<input class="qty-inp" type="number" min="1" value="'+i.qty+'" onchange="updCartQty(\''+esc(i.prod.n)+'\',this.value)" style="width:36px">'
      +'<button class="qty-btn" onclick="updCartQty(\''+esc(i.prod.n)+'\',' +(i.qty+1)+ ')">+</button>'
      +'</div>'
      +'<span style="font-size:11px;color:var(--text-dim)">× '+fPrice(r.price,MON)+'</span>'
      +'</div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">'
      +'<button class="cart-item-rm" onclick="removeFromCart(\''+esc(i.prod.n)+'\')">✕</button>'
      +'<span class="cart-item-price">'+fPrice(lineTotal,MON)+'</span>'
      +'</div></div>';
  }).join('');
  totEl.textContent = fPrice(total, MON) + ' ' + MON;
}

function sendWA(){
  var items = Object.values(CART);
  if(!items.length){ alert('Agrega productos al pedido primero'); return; }
  var lines = items.map(function(i){
    var r = getCartPrice(i);
    return '• '+i.qty+'× '+i.prod.n+' → '+fPrice(r.price*i.qty, MON)+(r.isMay?' (May)':' (Min)');
  });
  var total = items.reduce(function(a,i){
    return a + getCartPrice(i).price * i.qty;
  },0);
  var nota = (document.getElementById('cart-note').value||'').trim();
  var msg = '🏗️ *Pedido — '+ALM+'*\n\n'
    + lines.join('\n') + '\n\n'
    + '💰 *Total: '+fPrice(total,MON)+'*\n'
    + '📍 Almacén: *'+ALM+'*\n'
    + (nota?'📝 Nota: '+nota+'\n':'')
    + '\n_Solicito confirmación de disponibilidad y precio final._';
  var phone = WA[ALM]||WA.Habana;
  window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg), '_blank');
}

// ── START ─────────────────────────────────────────────────
init();
</script>

</html>
