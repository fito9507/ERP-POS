<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERP Test Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--border:#2a2a2a;--text:#e8e8e8;--dim:#888;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--purple:#a855f7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden}
#shell{display:grid;grid-template-columns:320px 1fr;grid-template-rows:56px 1fr;height:100vh}
#topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px}
#topbar h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-stat{font-size:11px;padding:4px 10px;border-radius:100px;font-weight:600}
.tb-pass{background:rgba(34,197,94,.15);color:var(--green)}
.tb-fail{background:rgba(239,68,68,.15);color:var(--red)}
.tb-skip{background:rgba(136,136,136,.15);color:var(--dim)}
.tb-btn{padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.tb-btn:hover{border-color:var(--dim)}
.tb-btn.primary{background:var(--green);color:#000;border-color:var(--green)}
.tb-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.tb-btn.primary:hover{opacity:.85}
#sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:10px}
.suite-hdr{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;padding:10px 8px 4px}
.test-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--dim)}
.test-item:hover{background:var(--bg3);color:var(--text)}
.test-item.running{color:var(--yellow);background:rgba(234,179,8,.06)}
.test-item.pass{color:var(--green)}
.test-item.fail{color:var(--red)}
.ti-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.ti-time{margin-left:auto;font-size:10px;color:var(--dim)}
#main{display:flex;flex-direction:column;overflow:hidden}
#log-area{flex:1;overflow-y:auto;padding:16px;font-family:'DM Mono',monospace,monospace;font-size:12px;line-height:1.8}
.log-line{padding:1px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-info{color:var(--blue)}
.log-pass{color:var(--green)}
.log-fail{color:var(--red);font-weight:600}
.log-warn{color:var(--yellow)}
.log-dim{color:var(--dim)}
.log-suite{color:var(--purple);font-weight:700;font-size:13px;margin-top:8px}
#progress{height:3px;background:var(--bg3)}
#progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .3s}
#erp-frame{display:none;width:0;height:0;border:none}
</style>
</head>
<body>
<div id="shell">
<div id="topbar">
  <h1>🧪 ERP Test Agent</h1>
  <span class="tb-stat tb-pass" id="st-pass">✓ 0</span>
  <span class="tb-stat tb-fail" id="st-fail">✗ 0</span>
  <span class="tb-stat tb-skip" id="st-skip">⏭ 0</span>
  <span style="flex:1"></span>
  <span id="st-time" style="font-size:11px;color:var(--dim)">0.0s</span>
  <button class="tb-btn primary" onclick="runAll()">▶ Run All</button>
  <button class="tb-btn" onclick="stopTests()">⏹ Stop</button>
  <button class="tb-btn" onclick="clearLog()">🗑 Clear</button>
</div>
<div id="sidebar"></div>
<div id="main">
  <div id="progress"><div id="progress-bar"></div></div>
  <div id="log-area"></div>
</div>
</div>
<iframe id="erp-frame" src="index.html"></iframe>
<script src="test-runner.js"></script>
<script src="test-suites.js"></script>
</body>
</html>
